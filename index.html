<!DOCTYPE html>

    <link rel="stylesheet" href="./src/css/reset.css" />

      <div id="loader__bar"></div>

        <span id="loader__percent">%</span>

    </div>

        <a href="/about.html" class="nav__link" data-link>About</a>
      </div>
    </nav>

    <div id="scroll-container">
      <div id="sticky-wrap">

          <div class="item" data-index="0" data-title="Project Title One">
