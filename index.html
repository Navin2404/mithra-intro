<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Name — Portfolio</title>
    <link rel="stylesheet" href="./src/css/reset.css" />
    <link rel="stylesheet" href="./src/css/style.css" />
  </head>
  <body>

    <div id="loader">
      <div id="loader__bar"></div>
      <div id="loader__count">
        <span id="loader__number">0</span>
        <span id="loader__percent">%</span>
      </div>
    </div>

    <div id="page-transition"></div>

    <div id="cursor">
      <div id="cursor__dot"></div>
      <div id="cursor__ring"></div>
    </div>

    <nav id="nav">
      <a href="#" class="nav__link nav__link--active">Work</a>
      <a href="/about.html" class="nav__link" data-link>About</a>
    </nav>

    <!-- Fixed stage — no scrolling, JS drives everything -->
    <div id="stage">
      <div id="strip">

        <div class="item" data-index="0" data-title="Project Title One">
          <div class="item__img-wrap">
            <img src="/assets/images/project-01.jpg" alt="Project Title One" />
          </div>
          <div class="item__corner item__corner--tl">+</div>
          <div class="item__corner item__corner--tr">+</div>
          <div class="item__corner item__corner--bl">+</div>
          <div class="item__corner item__corner--br">+</div>

        </div>
